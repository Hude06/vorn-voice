appId: com.vorn.voice
productName: Vorn Voice
directories:
  output: release
files:
  - dist/**
  - package.json
extraResources:
  - from: build/runtime/bin
    to: bin
  - from: build/runtime/lib
    to: lib
  - from: build/runtime/models
    to: models
  - from: build/runtime/runtime-manifest.json
    to: runtime-manifest.json
  - from: build/tray
    to: tray
mac:
  icon: build/icon.icns
  category: public.app-category.productivity
  target:
    - dmg
    - zip
  forceCodeSigning: true
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  gatekeeperAssess: false
publish:
  provider: generic
  url: https://vorn.judemakes.dev/updates/mac/stable
